<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#grad1)" />
  
  <!-- Abstract Decorative Elements -->
  <circle cx="1000" cy="100" r="150" fill="#3b82f6" fill-opacity="0.1" filter="url(#glow)" />
  <circle cx="200" cy="500" r="100" fill="#8b5cf6" fill-opacity="0.1" filter="url(#glow)" />
  
  <!-- Grid lines -->
  <g stroke="#1e293b" stroke-width="1">
    <path d="M 0 100 L 1200 100 M 0 200 L 1200 200 M 0 300 L 1200 300 M 0 400 L 1200 400 M 0 500 L 1200 500" />
    <path d="M 100 0 L 100 630 M 200 0 L 200 630 M 300 0 L 300 630 M 400 0 L 400 630 M 500 0 L 500 630" />
  </g>

  <!-- Content -->
  <text x="50%" y="45%" text-anchor="middle" font-family="monospace" font-size="72" font-weight="bold" fill="#ffffff">
    Ahmed Ben Abdallah
  </text>
  <text x="50%" y="55%" text-anchor="middle" font-family="monospace" font-size="32" fill="#94a3b8" letter-spacing="4">
    DEVELOPER &amp; CREATOR
  </text>
  
  <!-- Accent Border -->
  <rect x="40" y="40" width="1120" height="550" rx="10" stroke="#3b82f6" stroke-width="2" fill="none" stroke-opacity="0.3" />
</svg>
